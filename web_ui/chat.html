<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Chat</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/vendor/marked.min.js" defer></script>
    <script src="/static/vendor/purify.min.js" defer></script>
    <script src="/static/chat.js" defer></script>
  </head>
  <body class="metrics-body chat-body">
    <main class="chat-shell">
      <header class="page-topbar">
        <nav class="topbar-nav" aria-label="Console pages">
          <a class="console-link" href="/">Console</a>
          <a class="console-link active" href="/chat">Chat</a>
          <a class="console-link" href="/scripts">Scripts</a>
          <a class="console-link" href="/font-grid">Font Grid</a>
          <a class="console-link" href="/controller-metrics">Metrics</a>
        </nav>
      </header>

      <div class="chat-workspace">
        <aside id="chatSidebar" class="chat-sidebar" aria-label="Saved chats">
          <div class="chat-sidebar-head">
            <p class="eyebrow">Saved chats</p>
            <button id="chatNew" type="button" class="chat-new" title="New chat">
              <span aria-hidden="true">＋</span> New
            </button>
          </div>
          <ul id="sessionList" class="session-list" aria-live="polite"></ul>
          <p id="sessionEmpty" class="session-empty">No saved chats yet.</p>
        </aside>

        <section class="chat-card" aria-label="Claude chat">
          <div class="chat-bar">
            <button
              id="chatSidebarToggle"
              type="button"
              class="icon-button chat-sidebar-toggle"
              title="Saved chats"
              aria-label="Toggle saved chats"
              aria-expanded="false"
            >
              <span aria-hidden="true">&#9776;</span>
            </button>
            <p id="chatTitle" class="chat-bar-title">New conversation</p>
            <span id="chatUsageTotal" class="chat-bar-usage hidden" title="Session token usage and estimated cost"></span>
          </div>
          <div id="chatLog" class="chat-log" aria-live="polite">
            <div id="chatEmpty" class="chat-empty">
              <p class="chat-empty-title">What should the display show?</p>
              <p class="chat-empty-sub">
                Claude drives the 28×28 flip-dot panel through its tools.
              </p>
              <div class="chat-chips">
                <button type="button" class="chat-chip">Write “HELLO” on the display</button>
                <button type="button" class="chat-chip">Draw a smiley face</button>
                <button type="button" class="chat-chip">What's on the panel right now?</button>
              </div>
            </div>
          </div>
          <p id="chatNote" class="system-note hidden"></p>
          <form id="chatForm" class="chat-composer" autocomplete="off">
            <textarea
              id="chatInput"
              rows="1"
              maxlength="2000"
              placeholder="Tell the display what to do…"
              autocomplete="off"
            ></textarea>
            <div class="chat-composer-toolbar">
              <span id="chatCount" class="chat-count">0 / 2000</span>
              <div class="chat-composer-actions">
                <select id="chatModel" class="chat-model" aria-label="Model">
                  <option value="claude-opus-4-8" selected>Claude Opus 4.8</option>
                  <option value="claude-sonnet-5">Claude Sonnet 5</option>
                  <option value="claude-fable-5">Claude Fable 5</option>
                </select>
                <button id="chatStop" type="button" class="chat-stop hidden" title="Stop">
                  <span aria-hidden="true">■</span>
                </button>
                <button id="chatSend" type="submit" class="chat-send" title="Send">
                  <span aria-hidden="true">↑</span>
                </button>
              </div>
            </div>
          </form>
        </section>
      </div>
    </main>
    <div id="chatSidebarScrim" class="chat-sidebar-scrim" hidden></div>
  </body>
</html>
