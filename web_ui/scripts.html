<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script Browser</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/scripts.js" defer></script>
  </head>
  <body class="metrics-body scripts-body">
    <main class="scripts-shell">
      <header class="page-topbar">
        <nav class="topbar-nav" aria-label="Console pages">
          <a class="console-link" href="/">Console</a>
          <a class="console-link" href="/chat">Chat</a>
          <a class="console-link active" href="/scripts">Scripts</a>
          <a class="console-link" href="/font-grid">Font Grid</a>
          <a class="console-link" href="/controller-metrics">Metrics</a>
        </nav>
      </header>

      <div class="scripts-workspace">
        <aside id="scriptsSidebar" class="scripts-sidebar" aria-label="Script list">
          <div class="scripts-sidebar-head">
            <p class="eyebrow">Scripts</p>
            <button id="scriptsRefresh" type="button" class="icon-button" title="Refresh list" aria-label="Refresh">
              &#8635;
            </button>
          </div>
          <ul id="scriptList" class="script-list" aria-live="polite" aria-label="Script list"></ul>
          <p id="scriptListEmpty" class="session-empty hidden">No scripts saved yet.</p>
          <p id="scriptListError" class="scripts-status error hidden"></p>
        </aside>

        <section class="scripts-viewer" aria-label="Script viewer">
          <div class="scripts-bar">
            <button
              id="scriptsSidebarToggle"
              type="button"
              class="icon-button scripts-sidebar-toggle"
              title="Scripts list"
              aria-label="Toggle scripts list"
              aria-expanded="false"
            >
              <span aria-hidden="true">&#9776;</span>
            </button>
            <p id="scriptsBarTitle" class="scripts-bar-title">Script browser</p>
            <span id="scriptsDetailStatus" class="status-pill muted hidden">idle</span>
          </div>
          <div id="scriptsPlaceholder" class="scripts-placeholder">
            <p class="scripts-placeholder-text">Select a script to view its source.</p>
          </div>
          <div id="scriptsDetail" class="scripts-detail hidden">
            <div class="scripts-actions">
              <button id="scriptsPlay" type="button" class="accent">Play</button>
              <button id="scriptsDelete" type="button" class="secondary scripts-delete-btn">Delete</button>
              <label class="scripts-rotation">
                <input id="scriptsRotation" type="checkbox" />
                <span>In hourly rotation</span>
              </label>
            </div>
            <p id="scriptsActionStatus" class="scripts-status hidden"></p>
            <pre id="scriptsCode" class="scripts-code"><code></code></pre>
          </div>
        </section>
      </div>
    </main>
    <div id="scriptsSidebarScrim" class="scripts-sidebar-scrim" hidden></div>
  </body>
</html>
