<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Flipdot Console</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel-wrap">
        <canvas id="matrix" width="560" height="560" aria-label="Flipdot display"></canvas>
        <div class="status-row">
          <span id="statusText">Connecting...</span>
          <span id="sourceText">Source: none</span>
        </div>
      </section>

      <section class="controls">
        <div id="modeControls"></div>
        <div id="boardEditor" class="board-editor hidden" aria-live="polite">
          <h2>Board Editor</h2>

          <div class="board-section">
            <h3>Toolbar</h3>
            <div class="board-toolbar" role="toolbar" aria-label="Board tools">
              <button type="button" class="tool-btn" data-tool="select" title="Select and move" aria-label="Select and move">↔</button>
              <button type="button" class="tool-btn" data-tool="freehand" title="Freehand draw" aria-label="Freehand draw">✎</button>
              <button type="button" class="tool-btn" data-tool="line" title="Line" aria-label="Line">／</button>
              <button type="button" class="tool-btn" data-tool="rectangle" title="Rectangle" aria-label="Rectangle">▭</button>
              <button type="button" class="tool-btn" data-tool="circle" title="Circle" aria-label="Circle">◯</button>
              <button type="button" class="tool-btn" data-tool="text" title="Text tool" aria-label="Text tool">T</button>
              <button type="button" class="tool-btn" data-tool="image" title="Image tool" aria-label="Image tool">▦</button>
              <button id="boardUndo" type="button" class="tool-btn tool-action" title="Undo" aria-label="Undo">↺</button>
              <button id="boardDeleteSelection" type="button" class="tool-btn tool-action" title="Delete selected" aria-label="Delete selected">⌫</button>
              <button id="boardClear" type="button" class="tool-btn tool-action" title="Clear board" aria-label="Clear board">✕</button>
            </div>
            <p id="boardSelectionSummary" class="board-summary">No object selected</p>
            <div class="legacy-controls" aria-hidden="true">
              <label for="boardTool">Draw tool</label>
              <select id="boardTool">
                <option value="freehand">Freehand</option>
                <option value="line">Line</option>
                <option value="rectangle">Rectangle</option>
                <option value="circle">Circle</option>
              </select>
              <label class="toggle-row" for="boardDrawToggle">
                <input id="boardDrawToggle" type="checkbox" checked />
                Draw on canvas
              </label>
            </div>
          </div>

          <div class="board-section">
            <h3>Properties</h3>
            <label for="boardTextObjectSelect">Text object</label>
            <select id="boardTextObjectSelect"></select>
            <div class="board-row compact">
              <button id="boardTextAdd" type="button" class="accent">Add</button>
              <button id="boardTextDelete" type="button" class="secondary">Delete</button>
            </div>

            <label for="boardText">Text</label>
          <div class="board-row">
            <input id="boardText" type="text" maxlength="64" placeholder="Type text" />
              <button id="boardApplyText" type="button" class="accent">Update</button>
            </div>

            <div class="board-grid">
              <label for="boardFontFamily">Font</label>
              <select id="boardFontFamily"></select>
              <label for="boardFontSize">Size</label>
              <select id="boardFontSize"></select>
            </div>
            <div class="board-grid">
              <label for="boardFontStyle">Style</label>
              <select id="boardFontStyle"></select>
              <label for="boardScrollSpeed">Scroll speed</label>
              <input id="boardScrollSpeed" type="number" min="1" max="40" step="1" value="7" />
            </div>
            <label class="toggle-row" for="boardTextScroll">
              <input id="boardTextScroll" type="checkbox" />
              Scroll when too wide
            </label>
            <details class="advanced-panel">
              <summary>Advanced position</summary>
              <div class="board-grid">
                <label for="boardTextX">Text X</label>
                <input id="boardTextX" type="number" value="0" min="-28" max="28" />
                <label for="boardTextY">Text Y</label>
                <input id="boardTextY" type="number" value="11" min="-28" max="28" />
              </div>
              <div class="board-grid">
                <label for="boardImageX">Image X</label>
                <input id="boardImageX" type="number" value="0" min="-28" max="28" />
                <label for="boardImageY">Image Y</label>
                <input id="boardImageY" type="number" value="0" min="-28" max="28" />
              </div>
            </details>
          </div>

          <div class="board-section">
            <h3>Image Tool</h3>
            <input id="boardImageFile" type="file" accept="image/*" />
            <div class="board-grid">
              <label for="boardImageMode">Mode</label>
              <select id="boardImageMode">
                <option value="stamp">Stamp to pixels</option>
                <option value="object">Create image object</option>
              </select>
              <label for="boardImageThreshold">Threshold</label>
              <input id="boardImageThreshold" type="number" min="0" max="255" value="128" />
            </div>
            <button id="boardUploadImage" type="button" class="accent">Place At Advanced X/Y</button>
          </div>

          <div class="board-section">
            <h3>Boards</h3>
            <label for="boardNameInput">Board name</label>
            <input id="boardNameInput" type="text" maxlength="64" placeholder="default" />
            <label for="boardList">Saved boards</label>
            <select id="boardList"></select>
            <div class="board-row compact">
              <button id="boardSaveNamed" type="button" class="accent">Save</button>
              <button id="boardLoadNamed" type="button" class="secondary">Load</button>
            </div>
            <button id="boardDeleteNamed" type="button" class="secondary">Delete</button>
          </div>

        </div>
      </section>
    </main>
  </body>
</html>
