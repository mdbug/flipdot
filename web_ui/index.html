<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Flipdot Console</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/app.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="display-deck" aria-label="Flipdot display console">
        <header class="topbar">
          <div>
            <p class="eyebrow">Live panel</p>
            <p class="console-links">
              <a class="console-link" href="/chat">Claude Chat</a>
              <a class="console-link" href="/scripts">Scripts</a>
              <a class="console-link" href="/font-grid">Open Font Grid</a>
              <a class="console-link" href="/controller-metrics">Controller Metrics</a>
            </p>
          </div>
          <div class="connection-strip" aria-live="polite">
            <span id="statusText" class="status-pill">Connecting...</span>
            <span id="sourceText" class="status-pill muted">Source: none</span>
            <span
              id="controllerStatuses"
              class="controller-statuses"
              aria-label="Controller status list"
            ></span>
          </div>
        </header>

        <div class="matrix-stage">
          <canvas id="matrix" width="560" height="560" aria-label="Flipdot display"></canvas>
        </div>
      </section>

      <aside class="control-rail" aria-label="Flipdot controls">
        <section class="rail-section mode-section" aria-label="Mode actions">
          <div class="section-head">
            <p class="eyebrow">Mode</p>
            <button
              id="settingsToggle"
              type="button"
              class="icon-button"
              title="Sleep settings"
              aria-label="Sleep settings"
            >
              <span aria-hidden="true">&#9881;</span>
            </button>
          </div>
          <div id="modeControls" class="mode-grid"></div>
        </section>

        <section
          id="sleepSettings"
          class="rail-section settings-panel hidden"
          aria-live="polite"
          aria-label="Sleep mode settings"
        >
          <div class="section-head compact">
            <p class="eyebrow">Sleep</p>
            <label class="switch" for="sleepEnabled" title="Enable sleep mode">
              <input id="sleepEnabled" type="checkbox" checked />
              <span></span>
            </label>
          </div>
          <div class="field-grid two-col">
            <label for="sleepStartHour">Start</label>
            <input id="sleepStartHour" type="number" min="0" max="23" step="1" value="0" />
            <label for="sleepEndHour">End</label>
            <input id="sleepEndHour" type="number" min="0" max="23" step="1" value="7" />
          </div>
          <p id="sleepSettingsStatus" class="system-note">Sleep settings not loaded yet.</p>
        </section>

        <section
          id="fontPreviewSettings"
          class="rail-section settings-panel hidden"
          aria-live="polite"
          aria-label="Font preview settings"
        >
          <div class="section-head compact">
            <p class="eyebrow">Font Preview</p>
          </div>
          <div class="field-grid">
            <label for="fontPreviewPhrase">Font phrase</label>
            <input id="fontPreviewPhrase" type="text" maxlength="32" value="FLIPDOT" />
          </div>
          <div class="field-grid">
            <label for="fontPreviewSpacing">Glyph spacing</label>
            <input id="fontPreviewSpacing" type="number" min="0" max="6" step="1" value="0" />
          </div>
          <div class="font-preview-group">
            <p class="font-preview-group-label">Compare slots (max 4)</p>
            <div
              id="fontPreviewSlots"
              class="font-preview-slots"
              aria-label="Font preview compare slots"
            ></div>
          </div>
          <p id="fontPreviewStatus" class="system-note">Font preview phrase not loaded yet.</p>
        </section>

        <section
          id="boardEditor"
          class="board-editor hidden"
          aria-live="polite"
          aria-label="Board editor"
        >
          <div class="board-command-bar" role="toolbar" aria-label="Board tools">
            <div class="tool-group" role="group" aria-label="Tools">
              <button
                type="button"
                class="tool-btn"
                data-tool="select"
                title="Select and move"
                aria-label="Select and move"
              >
                <span aria-hidden="true">&#8597;</span>
              </button>
              <button
                type="button"
                class="tool-btn"
                data-tool="draw"
                title="Draw"
                aria-label="Draw"
              >
                <span aria-hidden="true">&#9998;</span>
              </button>
              <button
                type="button"
                class="tool-btn"
                data-tool="text"
                title="Text"
                aria-label="Text"
              >
                <span aria-hidden="true">T</span>
              </button>
              <button
                type="button"
                class="tool-btn"
                data-tool="image"
                title="Image"
                aria-label="Image"
              >
                <span aria-hidden="true">&#9638;</span>
              </button>
            </div>
            <div class="tool-group tool-actions" role="group" aria-label="Actions">
              <button
                id="boardUndo"
                type="button"
                class="tool-btn tool-action"
                title="Undo"
                aria-label="Undo"
              >
                <span aria-hidden="true">&#8630;</span>
              </button>
              <button
                id="boardDeleteSelection"
                type="button"
                class="tool-btn tool-action"
                title="Delete selected"
                aria-label="Delete selected"
              >
                <span aria-hidden="true">&#9003;</span>
              </button>
              <button
                id="boardClear"
                type="button"
                class="tool-btn tool-action danger"
                title="Clear board"
                aria-label="Clear board"
              >
                <span aria-hidden="true">&#10005;</span>
              </button>
              <button
                id="boardsMenuToggle"
                type="button"
                class="tool-btn tool-action"
                title="Boards"
                aria-label="Boards"
                aria-expanded="false"
              >
                <span aria-hidden="true">&#9776;</span>
              </button>
            </div>
          </div>

          <p id="boardSelectionSummary" class="selection-readout">No object selected</p>

          <div class="legacy-controls" aria-hidden="true">
            <select id="boardTool">
              <option value="freehand">Freehand</option>
              <option value="line">Line</option>
              <option value="rectangle">Rectangle</option>
              <option value="circle">Circle</option>
            </select>
            <input id="boardDrawToggle" type="checkbox" checked />
          </div>

          <div id="boardContext" class="board-context">
            <div class="context-block quiet-state" data-context="empty">
              <p class="context-hint">Object properties</p>
            </div>

            <div class="context-block" data-context="draw" hidden>
              <div class="shape-picker" role="group" aria-label="Draw shape">
                <button
                  type="button"
                  class="shape-btn"
                  data-shape="freehand"
                  title="Freehand"
                  aria-label="Freehand"
                >
                  <span aria-hidden="true">&#9998;</span>
                </button>
                <button
                  type="button"
                  class="shape-btn"
                  data-shape="line"
                  title="Line"
                  aria-label="Line"
                >
                  <span aria-hidden="true">/</span>
                </button>
                <button
                  type="button"
                  class="shape-btn"
                  data-shape="rectangle"
                  title="Rectangle"
                  aria-label="Rectangle"
                >
                  <span aria-hidden="true">&#9645;</span>
                </button>
                <button
                  type="button"
                  class="shape-btn"
                  data-shape="circle"
                  title="Circle"
                  aria-label="Circle"
                >
                  <span aria-hidden="true">&#9675;</span>
                </button>
              </div>
              <div class="field-grid two-col draw-options">
                <label for="boardDrawLineWidth">Width</label>
                <input id="boardDrawLineWidth" type="number" min="1" max="8" step="1" value="1" />
                <label for="boardDrawColor">Color</label>
                <select id="boardDrawColor">
                  <option value="on">On</option>
                  <option value="off">Off (erase)</option>
                </select>
              </div>
              <p class="context-hint">Shape tool</p>
            </div>

            <div class="context-block" data-context="text" hidden>
              <div class="board-row text-object-row">
                <select id="boardTextObjectSelect" aria-label="Text object"></select>
                <button
                  id="boardTextAdd"
                  type="button"
                  class="accent"
                  title="Add text object"
                  aria-label="Add text object"
                >
                  +
                </button>
                <button
                  id="boardTextDelete"
                  type="button"
                  class="secondary"
                  title="Delete text object"
                  aria-label="Delete text object"
                >
                  &#9003;
                </button>
              </div>
              <div class="board-row">
                <input id="boardText" type="text" maxlength="64" placeholder="Text" />
                <button id="boardApplyText" type="button" class="accent">Apply</button>
              </div>
              <div class="field-grid">
                <label for="boardFontFamily">Font</label>
                <select id="boardFontFamily"></select>
                <label for="boardFontSize">Size</label>
                <select id="boardFontSize"></select>
                <label for="boardFontStyle">Style</label>
                <select id="boardFontStyle"></select>
                <label for="boardGlyphSpacing">Spacing</label>
                <input id="boardGlyphSpacing" type="number" min="0" max="6" step="1" value="1" />
                <label for="boardScrollSpeed">Speed</label>
                <input id="boardScrollSpeed" type="number" min="1" max="40" step="1" value="7" />
                <label for="boardTextX">X</label>
                <input id="boardTextX" type="number" value="0" min="-28" max="28" />
                <label for="boardTextY">Y</label>
                <input id="boardTextY" type="number" value="11" min="-28" max="28" />
              </div>
              <label class="toggle-row" for="boardTextScroll">
                <input id="boardTextScroll" type="checkbox" />
                <span>Scroll</span>
              </label>
              <p class="context-hint" data-context-hint="text-place">Text placement</p>
            </div>

            <div class="context-block" data-context="image" hidden>
              <input id="boardImageFile" type="file" accept="image/*" />
              <div class="field-grid">
                <label for="boardImageMode">Mode</label>
                <select id="boardImageMode">
                  <option value="stamp">Stamp</option>
                  <option value="object">Object</option>
                </select>
                <label for="boardImageThreshold">Threshold</label>
                <input id="boardImageThreshold" type="number" min="0" max="255" value="128" />
                <label for="boardImageX">X</label>
                <input id="boardImageX" type="number" value="0" min="-28" max="28" />
                <label for="boardImageY">Y</label>
                <input id="boardImageY" type="number" value="0" min="-28" max="28" />
              </div>
              <button id="boardUploadImage" type="button" class="accent">Place</button>
              <p class="context-hint" data-context-hint="image-place">Image placement</p>
            </div>
          </div>

          <div id="boardsMenu" class="boards-menu hidden" aria-label="Saved boards">
            <div class="board-row">
              <input
                id="boardNameInput"
                type="text"
                maxlength="64"
                placeholder="default"
                aria-label="Board name"
              />
              <button id="boardSaveNamed" type="button" class="accent">Save</button>
            </div>
            <select id="boardList" aria-label="Saved boards"></select>
            <div class="board-row compact">
              <button id="boardLoadNamed" type="button" class="secondary">Load</button>
              <button id="boardDeleteNamed" type="button" class="secondary danger-text">
                Delete
              </button>
            </div>
          </div>
        </section>
      </aside>
    </main>
  </body>
</html>
